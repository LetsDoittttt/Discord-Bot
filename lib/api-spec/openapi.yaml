openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification for Discord Auto-Poster Bot Dashboard
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: logs
    description: Bot activity logs
  - name: config
    description: Bot configuration
  - name: bot
    description: Bot status and control
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /logs:
    get:
      operationId: listLogs
      tags: [logs]
      summary: List bot activity logs
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            default: 50
        - in: query
          name: offset
          schema:
            type: integer
            default: 0
        - in: query
          name: status
          schema:
            type: string
            enum: [success, failed, skipped]
      responses:
        "200":
          description: List of logs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LogList"
    post:
      operationId: createLog
      tags: [logs]
      summary: Create a bot activity log entry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BotLogInput"
      responses:
        "201":
          description: Log entry created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BotLog"

  /stats:
    get:
      operationId: getStats
      tags: [logs]
      summary: Get bot statistics summary
      responses:
        "200":
          description: Statistics summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BotStats"

  /config:
    get:
      operationId: getConfig
      tags: [config]
      summary: Get current bot configuration
      responses:
        "200":
          description: Current configuration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BotConfig"
    put:
      operationId: updateConfig
      tags: [config]
      summary: Update bot configuration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BotConfigInput"
      responses:
        "200":
          description: Updated configuration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BotConfig"

  /bot/status:
    get:
      operationId: getBotStatus
      tags: [bot]
      summary: Get bot running status
      responses:
        "200":
          description: Bot status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BotStatus"

  /bot/heartbeat:
    post:
      operationId: postHeartbeat
      tags: [bot]
      summary: Bot heartbeat signal
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HeartbeatData"
      responses:
        "200":
          description: Heartbeat acknowledged
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BotStatus"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    BotLog:
      type: object
      required: [id, createdAt, status, originalUrl]
      properties:
        id:
          type: integer
        createdAt:
          type: string
          format: date-time
        level:
          type: string
          enum: [info, warn, error]
        message:
          type: ["string", "null"]
        originalUrl:
          type: string
        bypassedUrl:
          type: ["string", "null"]
        finalUrl:
          type: ["string", "null"]
        status:
          type: string
          enum: [success, failed, skipped]
        hadMedia:
          type: boolean

    BotLogInput:
      type: object
      required: [status, originalUrl]
      properties:
        level:
          type: string
          enum: [info, warn, error]
        message:
          type: string
        originalUrl:
          type: string
        bypassedUrl:
          type: string
        finalUrl:
          type: string
        status:
          type: string
          enum: [success, failed, skipped]
        hadMedia:
          type: boolean

    LogList:
      type: object
      required: [logs, total]
      properties:
        logs:
          type: array
          items:
            $ref: "#/components/schemas/BotLog"
        total:
          type: integer

    BotStats:
      type: object
      required: [totalLogs, successCount, failedCount, skippedCount, todayCount, bypassSuccessRate]
      properties:
        totalLogs:
          type: integer
        successCount:
          type: integer
        failedCount:
          type: integer
        skippedCount:
          type: integer
        todayCount:
          type: integer
        bypassSuccessRate:
          type: number

    BotConfig:
      type: object
      required: [id, sourceChannel, admavenEnabled, updatedAt]
      properties:
        id:
          type: integer
        sourceChannel:
          type: string
        admavenEnabled:
          type: boolean
        updatedAt:
          type: string
          format: date-time

    BotConfigInput:
      type: object
      properties:
        sourceChannel:
          type: string
        admavenEnabled:
          type: boolean

    BotStatus:
      type: object
      required: [isRunning, lastHeartbeat]
      properties:
        isRunning:
          type: boolean
        lastHeartbeat:
          type: ["string", "null"]
          format: date-time
        startedAt:
          type: ["string", "null"]
          format: date-time

    HeartbeatData:
      type: object
      required: [startedAt]
      properties:
        startedAt:
          type: string
          format: date-time
